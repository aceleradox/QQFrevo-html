<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QQFrevo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      :root{--accent:#7c3aed}
      html,body,#map{height:100%;margin:0}
      body{font-family:Outfit,Arial,Helvetica,sans-serif;background:#050014;color:#eee;display:flex;flex-direction:column}
      header{display:flex;align-items:center;gap:12px;padding:12px;background:linear-gradient(90deg,rgba(124,58,237,0.12),transparent);box-shadow:0 4px 18px rgba(0,0,0,0.5)}
      a.menu{color:var(--accent);text-decoration:none;padding:6px 10px;border-radius:8px}
      .container{display:flex;gap:12px;padding:12px;flex:1}
      .sidebar{width:300px;background:rgba(255,255,255,0.03);padding:12px;border-radius:10px}
      .main{flex:1;display:flex;flex-direction:column}
      #map{flex:1;border-radius:10px;overflow:hidden}
      .panel{background:rgba(255,255,255,0.03);padding:10px;border-radius:8px}
      select, #details { user-select: none; -webkit-user-select: none; -moz-user-select: none; }
      .btn{background:var(--accent);color:white;padding:8px 10px;border-radius:8px;text-decoration:none}
      /* animações simples */
      .fade-in{animation:fadeIn .6s ease both}
      @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    </style>
  </head>
  <body>
    <header>
      <h1 style="margin:0;font-size:18px">QQFrevo</h1>
      <nav style="margin-left:12px;display:flex;gap:8px;align-items:center">
        <span style="color:var(--accent);padding:6px 10px;border-radius:8px">Enviar evento (desativado)</span>
        <a class="menu" href="qqfrevo-list.html">Lista de eventos</a>
      </nav>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button id="locateBtn" class="btn">Minha localização</button>
      </div>
    </header>

    <div class="container">
      <div class="sidebar panel">
        <h3 style="margin:0 0 8px 0">Créditos</h3>
        <div id="reviewsList"></div>
      </div>

      <div class="main">
        <div id="map"></div>
        <div style="margin-top:10px;display:flex;gap:10px">
          <div class="panel" style="flex:1">
            <strong>Feed local</strong>
            <div id="feed" style="margin-top:8px"></div>
          </div>
          <div class="panel" style="width:260px">
            <strong>Contato / Ingressos</strong>
            <div style="margin-top:8px">
              <a id="symplaBtn" class="btn" href="#" target="_blank" rel="noopener">Sympla</a>
              <a id="instaBtn" style="margin-left:8px" class="btn" href="#" target="_blank" rel="noopener">Instagram</a>
            </div>
          </div>
        </div>
      </div>

      <div class="sidebar panel">
        <h3 style="margin:0 0 8px 0">Buscar frevo</h3>
        <label style="display:block;font-size:13px">Cidade</label>
        <input id="cityInput" type="text" value="Recife" style="width:100%;padding:8px;border-radius:8px;margin-top:6px;box-sizing:border-box" />
        <label style="display:block;font-size:13px;margin-top:8px">Tipo de frevo</label>
        <input id="typeInput" type="text" placeholder="Ex.: frevo tradicional" style="width:100%;padding:8px;border-radius:8px;margin-top:6px;box-sizing:border-box" />
        <button id="btnBuscar" class="btn" style="margin-top:8px;width:100%">Buscar no mapa</button>
        <div id="details" style="margin-top:10px;font-size:14px">Digite uma cidade e toque em buscar.</div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="data.js"></script>
    <script src="map.js"></script>
    <script src="feed.js"></script>
    <script src="main.js"></script>
    <script src="search.js"></script>
    <script>
      document.getElementById('locateBtn').addEventListener('click', ()=>{ if(window.QQMap && window.QQMap.locateMe) window.QQMap.locateMe(); });
    </script>
  </body>
</html>
